ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 输入0：轮式里程计（短期精准，震动不受影响）
    odom0: /wheel_odom
    odom0_config: [true, true, true,
                       false, false, false,
                       false, false, false,
                       false, false, true,
                       false, false, false]
    odom0_differential: false

    # 输入1：激光里程计（增量模式：只用帧间位移，不用绝对位姿）
    odom1: /laser_odom
    odom1_config: [true, true, false,
                       false, false, true,
                       false, false, false,
                       false, false, false,
                       false, false, false]
    odom1_differential: true
    odom1_queue_size: 3

    imu0: /imu
    imu0_config: [false, false, false,
                        true, true, true,
                        false, false, false,
                        false, false, false,
                        false, false, false]
    imu0_differential: false
    
